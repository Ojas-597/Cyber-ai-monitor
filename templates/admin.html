{% extends "base.html" %}
{% block content %}

<h2>👑 Admin Panel</h2>

<a href="/download_report">📥 Download Report</a>

<hr>

<!-- 👥 USER MANAGEMENT -->
<div class="card">
    <h3>👥 Manage Users</h3>

    <form method="post" action="/admin/add_user">
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>

        <select name="role">
            <option value="user">User</option>
            <option value="admin">Admin</option>
        </select>

        <button type="submit">Add User</button>
    </form>

    <ul>
        {% for u in users %}
        <li>
            <b>{{u[0]}}</b> ({{u[1]}})

            <a href="/admin/delete/{{u[0]}}" style="color:red;">Delete</a>

            <form method="post" action="/admin/reset/{{u[0]}}" style="display:inline;">
                <input name="password" placeholder="New password" required>
                <button type="submit">Reset</button>
            </form>
        </li>
        {% endfor %}
    </ul>
</div>

<hr>

<!-- 📊 LOGS / ACTIVITY -->
<div class="card">
    <h3>📊 System Logs</h3>
    <ul id="logs"></ul>
</div>

{% endblock %}
